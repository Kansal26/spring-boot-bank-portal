<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>System Error - Vartaalap Banking</title>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-indigo: #1e1b4b; /* Deeper Indigo */
      --accent-gold: #94a3b8;    /* Muted Slate */
    }
    body {
      margin: 0;
      font-family: 'Public Sans', sans-serif;
      background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    .error-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 4rem;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 500px;
      width: 90%;
      color: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    h1 {
      font-size: 5rem;
      margin: 0;
      background: #1e1b4b;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    h2 {
      font-size: 1.75rem;
      color: var(--primary-indigo);
      margin: 1rem 0;
      font-weight: 800;
    }
    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      font-weight: 500;
    }

  </style>

    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>
    <!-- Custom Cursor & Background -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>
    <div class="bg-grid"></div>
    <div class="spotlight" id="spotlight"></div>

  <div class="error-container">
    <h1>!</h1>
    <h2>Oops! Something went wrong</h2>
    <p th:text="${errorMessage} ?: 'We encountered an unexpected issue while processing your request. Please try again or contact support if the problem persists.'"></p>
    <a href="/" class="btn">Return to Safety</a>
  </div>
    <script th:src="@{/js/global.js}"></script>

</body>
</html>
