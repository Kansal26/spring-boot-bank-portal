<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>System Error - Vartaalap Banking</title>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-indigo: #1e1b4b; /* Deeper Indigo */
      --accent-gold: #94a3b8;    /* Muted Slate */
    }
    body {
      margin: 0;
      font-family: 'Public Sans', sans-serif;
      background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    .error-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 4rem;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 500px;
      width: 90%;
      color: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    h1 {
      font-size: 5rem;
      margin: 0;
      background: #1e1b4b;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    h2 {
      font-size: 1.75rem;
      color: var(--primary-indigo);
      margin: 1rem 0;
      font-weight: 800;
    }
    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      font-weight: 500;
    }
    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: #1e1b4b;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 800;
      transition: all 0.2s;
      box-shadow: 0 10px 15px -3px rgba(26, 35, 126, 0.3);
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 25px -5px rgba(26, 35, 126, 0.4);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>!</h1>
    <h2>Oops! Something went wrong</h2>
    <p th:text="${errorMessage} ?: 'We encountered an unexpected issue while processing your request. Please try again or contact support if the problem persists.'"></p>
    <a href="/" class="btn">Return to Safety</a>
  </div>
</body>
</html>
