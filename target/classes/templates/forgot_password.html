<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Bank Portal</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link href="https://fonts.googleapis.com/css2?display=swap&family=Noto+Sans:wght@400;500;700;900&family=Public+Sans:wght@400;500;700;900" rel="stylesheet" />
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <style>
        .step-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(10, 132, 255, 0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 700;
            margin: 0 auto 2rem auto;
            width: fit-content;
            border: 1px solid rgba(10, 132, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>
    <div class="bg-grid"></div>
    <div class="spotlight" id="spotlight"></div>



    <div class="app-container">
        <div class="card glass-3d hover-target tilt-card" style="padding: 3rem; max-width: 480px; text-align: center;">
            <div class="logo-section">
                <img src="/images/logo.png" alt="Vartaalap Logo" class="logo-img" style="margin: 0 auto 1.5rem auto;" />
            </div>
            
            <h2 class="form-title" style="margin-bottom: 0.5rem;">Secure Recovery</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
                Verify your identity to receive a one-time passcode.
            </p>

            <div class="step-badge">Step 1 of 3 — Identity Verification</div>

            <div th:if="${error}" class="alert-danger" style="margin-bottom: 1.5rem;" th:text="${error}"></div>

            <form th:action="@{/forgot-password}" method="post" style="text-align: left;">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="fp-email">Registered Email</label>
                    <input type="email" name="email" id="fp-email" placeholder="user@bank.com" required>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="fp-current-pw">Current Security Password</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" name="currentPassword" id="fp-current-pw" placeholder="••••••••" required>
                        <button type="button" onclick="togglePw('fp-current-pw', 'eye-curr')" style="position: absolute; right: 1rem; background: none; border: none; cursor: pointer; color: #64748b; padding: 0;">
                            <svg id="eye-curr" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-action" style="margin-bottom: 1.5rem;">
                    <button type="submit" class="btn btn-primary hover-target">Verify & Dispatch OTP</button>
                </div>
            </form>

            <a th:href="@{/login}" class="forgot-password">← Cancel & Return to Login</a>
        </div>
    </div>

    <script>
        function togglePw(inputId, iconId) {
            var input = document.getElementById(inputId);
            var icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }
    </script>
    <script th:src="@{/js/global.js}"></script>
</body>
</html>
