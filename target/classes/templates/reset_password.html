<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Reset Password - Bank Portal</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        :root {
            --primary-indigo: #1e1b4b; /* Deeper Indigo */
            --accent-gold: #94a3b8;    /* Muted Slate */
            --bg-gradient: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success-green: #16a34a;
            --error-red: #dc2626;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Public Sans', sans-serif;
        }

        .reset-card {
            background: var(--glass-bg);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .reset-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-indigo), #334155);
        }

        .reset-card h2 {
            margin-top: 0;
            color: var(--primary-indigo);
            text-align: center;
            font-weight: 800;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            height: 54px;
            padding: 0 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            background: #f8fafc;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-indigo);
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.05);
        }

        .btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 12px;
            background: #059669; /* Muted Emerald */
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 25px -5px rgba(22, 163, 74, 0.4);
        }

        .alert {
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .pw-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .pw-wrapper .form-control { padding-right: 3.5rem; }

        .pw-toggle {
            position: absolute;
            right: 1.25rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .pw-toggle:hover { color: var(--primary-indigo); }

        .step-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: #eef2ff;
            color: var(--primary-indigo);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 700;
            margin: 0 auto 2rem auto;
            width: fit-content;
            border: 1px solid rgba(26, 35, 126, 0.1);
        }

        #pw-match-msg {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            font-weight: 700;
            display: none;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <h2>🔑 Set New Password</h2>
        <p style="text-align: center; color: #666; margin-bottom: 1.25rem; font-size: 0.9rem;">
            Create a strong new password for <b th:text="${email}">user@example.com</b>
        </p>

        <div class="step-badge">Step 3 of 3 &mdash; New Password</div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/reset-password}" method="post" onsubmit="return validatePasswords()">
            <input type="hidden" name="email" th:value="${email}">

            <div class="form-group">
                <label for="rp-new">New Password</label>
                <div class="pw-wrapper">
                    <input type="password" name="password" id="rp-new" class="form-control"
                        placeholder="••••••••" required autofocus oninput="checkMatch()">
                    <button type="button" class="pw-toggle" onclick="togglePw('rp-new', 'eye-new')">
                        <svg id="eye-new" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="rp-confirm">Confirm New Password</label>
                <div class="pw-wrapper">
                    <input type="password" name="confirmPassword" id="rp-confirm" class="form-control"
                        placeholder="••••••••" required oninput="checkMatch()">
                    <button type="button" class="pw-toggle" onclick="togglePw('rp-confirm', 'eye-confirm')">
                        <svg id="eye-confirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div id="pw-match-msg"></div>
            </div>

            <button type="submit" class="btn">✅ Update Password</button>
        </form>
    </div>

    <script>
        function togglePw(inputId, iconId) {
            var input = document.getElementById(inputId);
            var icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }

        function checkMatch() {
            var pw = document.getElementById('rp-new').value;
            var confirm = document.getElementById('rp-confirm').value;
            var msg = document.getElementById('pw-match-msg');
            if (confirm.length === 0) { msg.style.display = 'none'; return; }
            msg.style.display = 'block';
            if (pw === confirm) {
                msg.textContent = '✅ Passwords match';
                msg.style.color = '#15803d';
            } else {
                msg.textContent = '❌ Passwords do not match';
                msg.style.color = '#b91c1c';
            }
        }

        function validatePasswords() {
            var pw = document.getElementById('rp-new').value;
            var confirm = document.getElementById('rp-confirm').value;
            if (pw !== confirm) {
                alert('Passwords do not match. Please try again.');
                return false;
            }
            return true;
        }
    </script>
</body>

</html>
