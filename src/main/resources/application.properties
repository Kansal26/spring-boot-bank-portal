# ✅ Hybrid Database Setup (H2 for Local, PostgreSQL for Production)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/demo}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}

# ✅ JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ✅ Enable H2 console (only works when DB_URL is H2)
spring.h2.console.enabled=true

# ✅ For dev, disables Thymeleaf caching
spring.thymeleaf.cache=false

# ✅ Optional: log Thymeleaf debug info
logging.level.org.thymeleaf=DEBUG
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ✅ External Email Setup (Gmail App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=adikansal2608@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:yddiildkmmmhstur}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

