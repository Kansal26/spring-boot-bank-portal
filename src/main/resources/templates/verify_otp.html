<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP - Vartaalap</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link href="https://fonts.googleapis.com/css2?display=swap&family=Noto+Sans:wght@400;500;700;900&family=Public+Sans:wght@400;500;700;900" rel="stylesheet" />
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <style>
        .step-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(10, 132, 255, 0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 700;
            margin: 0 auto 2rem auto;
            width: fit-content;
            border: 1px solid rgba(10, 132, 255, 0.4);
        }
        .otp-input {
            width: 100%;
            height: 64px;
            padding: 0;
            border: 2px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 16px;
            box-sizing: border-box;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1rem;
            background: rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            transition: all 0.2s;
            cursor: text !important;
        }
        .otp-input:focus {
            outline: none;
            border-color: var(--accent-blue) !important;
            background: rgba(255, 255, 255, 0.15) !important;
        }
    </style>
</head>
<body>
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>
    <div class="bg-grid"></div>
    <div class="spotlight" id="spotlight"></div>



    <div class="app-container">
        <div class="card glass-3d hover-target tilt-card" style="padding: 3rem; max-width: 480px; text-align: center;">
            <div class="logo-section">
                <img src="/images/logo.png" alt="Vartaalap Logo" class="logo-img" style="margin: 0 auto 1.5rem auto;" />
            </div>
            
            <h2 class="form-title" style="margin-bottom: 0.5rem;">Verify OTP</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
                Enter the 6-digit code sent to <br><b th:text="${email}" style="color: var(--text-primary);">user@example.com</b>
            </p>

            <div class="step-badge">Step 2 of 3 — Email Verification</div>

            <div th:if="${error}" class="alert-danger" style="margin-bottom: 1.5rem;" th:text="${error}"></div>

            <form th:action="@{/verify-otp}" method="post" style="text-align: left;">
                <input type="hidden" name="email" th:value="${email}">
                <div class="form-group" style="margin-bottom: 2rem;">
                    <input type="text" name="otp" class="otp-input" maxlength="6" pattern="\d{6}" placeholder="------" required autofocus>
                </div>
                <div class="form-action">
                    <button type="submit" class="btn btn-primary hover-target">Authenticate Token</button>
                </div>
            </form>
        </div>
    </div>
    <script th:src="@{/js/global.js}"></script>
</body>
</html>
