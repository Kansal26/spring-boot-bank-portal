<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Vartaalap Registration</title>
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
  <link href="https://fonts.googleapis.com/css2?display=swap&family=Noto+Sans:wght@400;500;700;900&family=Public+Sans:wght@400;500;700;900" rel="stylesheet" />
  <link rel="stylesheet" href="/css/login.css" />
  <link rel="stylesheet" th:href="@{/css/global.css}">
</head>

<body>
  <!-- Custom Cursor & Background -->
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-outline" id="cursor-outline"></div>
  <div class="bg-grid"></div>
  <div class="spotlight" id="spotlight"></div>

  <!-- Auth Background Interactive Orbs -->
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  <div class="glow-orb orb-3"></div>

  <div class="app-container">
    <div class="card glass-3d hover-target tilt-card" style="padding: 3rem;">
      <div class="logo-section">
        <h1 class="brand-name">VARTAALAP</h1>
        <div class="brand-tagline">Partners in Banking</div>
      </div>

      <div th:if="${error}" class="alert-danger" th:text="${error}">
        Error Registration
      </div>

      <h2 class="form-title" style="margin-top: 10px;">Self-Serve Admin Registration</h2>
      
      <form th:action="@{/register}" method="post">
        
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="bankName">Your Affiliated Bank (Branch Name)</label>
          <input type="text" id="bankName" name="bankName" placeholder="e.g. State Bank of India, HQ" required />
        </div>

        <div class="form-group" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
          <div style="flex: 1;">
            <label for="username">Requested Login ID</label>
            <input type="text" id="username" name="username" placeholder="Choose a unique ID" required />
          </div>
          <div style="flex: 1;">
            <label for="email">Work Email</label>
            <input type="email" id="email" name="email" placeholder="example@bank.com" required />
          </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 2rem;">
          <label for="password">Security Password</label>
          <div style="position: relative; display: flex; align-items: center;">
            <input type="password" id="password" name="password" placeholder="••••••••" required />
            <button type="button" id="toggle-password"
              onclick="togglePasswordVisibility('password', 'eye-icon-login')"
              style="position: absolute; right: 1rem; background: none; border: none; cursor: pointer; color: #64748b; padding: 0; display: flex; align-items: center;">
              <svg id="eye-icon-login" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-action">
          <button type="submit">Establish Admin Credentials</button>
        </div>
      </form>

      <a th:href="@{/login}" class="forgot-password" style="margin-top: 1.5rem;">Already have credentials? Authenticate</a>
    </div>
  </div>

  <script>
    function togglePasswordVisibility(inputId, iconId) {
      var input = document.getElementById(inputId);
      var icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    }
  </script>
  <script th:src="@{/js/global.js}"></script>
</body>
</html>
