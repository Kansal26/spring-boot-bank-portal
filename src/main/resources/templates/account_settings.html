<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Account Settings - Vartaalap Banking</title>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link href="https://fonts.googleapis.com/css2?display=swap&family=Noto+Sans:wght@400;500;700;900&family=Public+Sans:wght@400;500;700;900" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <style>
        :root {
            --content-bg: transparent;
            --text-main: #ffffff;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Public Sans', sans-serif;
            background-color: var(--content-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main) !important;
        }

        .admin-header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            color: white;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .brand-text {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        .settings-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        .section-title {
            color: #ffffff;
            font-size: 1.75rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 2rem;
            letter-spacing: -0.01em;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #cbd5e1;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #60a5fa;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
        }

        .btn-update {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: #ffffff;
            color: #000000;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: #ffffff;
        }

        .alert {
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
        }

        .alert-success {
            background-color: rgba(22, 163, 74, 0.2);
            color: #4ade80;
            border: 1px solid rgba(22, 163, 74, 0.4);
        }

        .alert-error {
            background-color: rgba(220, 38, 38, 0.2);
            color: #f87171;
            border: 1px solid rgba(220, 38, 38, 0.4);
        }
    </style>
</head>

<body>
    <!-- Custom Web App Theming (Cinematic Background) -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>
    <div class="bg-grid"></div>
    <div class="spotlight" id="spotlight"></div>

    <header class="admin-header">
        <div class="header-left">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="brand-text">Vartaalap Banking</span>
            </div>
        </div>
        <div class="user-info" style="display: flex; align-items: center; gap: 20px;">
            <div style="text-align: right;">
                <div style="font-size: 0.75rem; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase;">Account Settings</div>
                <span th:if="${userProfile}" th:text="${userProfile.username}" style="font-weight: 700;">User</span>
            </div>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn" style="padding: 0.625rem 1.25rem; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.875rem; background: #ffffff; color: #000000;">Sign Out</button>
            </form>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="settings-card">
            <h2 class="section-title">Change Password</h2>

            <!-- Feedback Alerts -->
            <div th:if="${success != null and !#strings.toString(success).startsWith('java.lang.Object') and success != false}" class="alert alert-success">
                <span th:text="${success}">Profile updated successfully!</span>
            </div>
            <div th:if="${error}" class="alert alert-error">
                <span th:text="${error}"></span>
            </div>

            <!-- Password Form -->
            <form th:action="@{/change-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="input-group">
                    <label>Current Password</label>
                    <input type="password" name="currentPassword" class="input-field" required placeholder="Enter current password">
                </div>

                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" name="newPassword" class="input-field" required placeholder="Enter new password">
                </div>

                <div class="input-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirmPassword" class="input-field" required placeholder="Confirm new password">
                </div>

                <button type="submit" class="btn-update">Update Password</button>
                <a th:href="@{/role-redirect}" class="btn-back">← Back to Dashboard</a>
            </form>
        </div>
    </div>
</body>
</html>
